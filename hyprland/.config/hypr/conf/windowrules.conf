# ==========================================================
# HYPRLAND WINDOW RULES (~/config/hyprland/windowrules.conf)
# ==========================================================

# ----------------------------------------------------------
# 1. Kitty Terminal
# ----------------------------------------------------------
# Tiled windows ignore 'size' and 'center' flags. By defining them here, 
# Kitty will tile normally (as a slave), but the moment you press your 
# float keybind, it will instantly snap to 600x400 and center itself.
windowrule = match:class ^(kitty)$, size 1400 800, center on

# ----------------------------------------------------------
# 2. KeePassXC Password Manager
# ----------------------------------------------------------
windowrule = match:class ^(org.keepassxc.KeePassXC)$, size 1200 900, float on, center on

# ----------------------------------------------------------
# 3. Floating Terminal Utilities (nmtui, bluetui, btop)
# ----------------------------------------------------------
# Note: To match these strictly by title, ensure your Waybar or keybinds 
# launch them with a title flag, e.g., `kitty -T nmtui -e nmtui`
# The 'move cursor -50% -50%' centers the new window exactly on your mouse.
windowrule = match:title ^(nmtui)$, float on, size 800 400, move cursor -50% -50%
windowrule = match:title ^(bluetui)$, float on, size 500 400, move cursor -50% -50%
windowrule = match:title ^(btop)$, float on, size 1800 1200, center on
windowrule = match:title ^(nvtop)$, float on, size 1800 1200, center on
windowrule = match:title ^(ranger)$, float on, size 1800 1200, center on


# ----------------------------------------------------------
# 3. Floating  Utilities (easy effects, pavucontrol)
# ----------------------------------------------------------
windowrule = match:title ^(easyeffects)$, float on, size 1800 1200, center on

# ----------------------------------------------------------
# 4. Pop-ups and Dialogs (Your existing rules)
# ----------------------------------------------------------
# Match by common titles
windowrule = match:title ^(Open File)$, float on, size 60% 60%, center on
windowrule = match:title ^(Select Folder)$, float on, size 60% 60%, center on
windowrule = match:title ^(Save As)$, float on, size 60% 60%, center on
windowrule = match:title ^(File Upload)$, float on, size 60% 60%, center on

# Match common GTK and KDE file pickers (XDG Desktop Portals)
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on, size 60% 60%, center on
windowrule = match:class ^(xdg-desktop-portal-kde)$, float on, size 60% 60%, center on

# Authentication Agents
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on, center on
windowrule = match:class ^(org.hyprland.hyprpolkitagent)$, float on, size 400 200, center on


# Blizzard / Battle.net rules
windowrule {
    name = battlenet-fixes
    match:class = ^(Battle\.net)$
    float = on
    center = on
}

# StarCraft II rules
windowrule {
    name = starcraft-fixes
    match:class = ^(StarCraft II)$
    float = off
    fullscreen = on
}

# ----------------------------------------------------------
# 5. Custom Dashboard
# ----------------------------------------------------------
windowrule {
    name = python-dashboard
    match:title = ^(Welcome Dashboard)$
    float = on
    size = 1200 900sum
    center = onsudo systemc
}


# ----------------------------------------------------------
# 5. Picture-in-Picture (Browsers)
# ----------------------------------------------------------
# Makes PiP float, stay on top, pin to all workspaces, and sit in the bottom right corner.
#  windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, keepabove on, move 100%-420 100%-240, size 400 225


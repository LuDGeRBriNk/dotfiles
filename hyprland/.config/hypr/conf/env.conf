#############################
### ENVIRONMENT VARIABLES ###
#############################

# Scaling
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1.4
env = QT_QPA_PLATFORM,wayland;xcb

# Nvidia-specific variables
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Tailor typing configuration (The Cedilla problem)
env = XDG_CONFIG_HOME,$HOME/.config

# Force GTK apps to use the dark theme
env = GTK_THEME,Adwaita:dark

# Force Electron apps to run natively in Wayland 
# (Fixes blurry text and popup bugs in VSCode, Discord, etc.)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Cursor variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Save screenshots here
env = HYPRSHOT_DIR,$HOME/screenshots
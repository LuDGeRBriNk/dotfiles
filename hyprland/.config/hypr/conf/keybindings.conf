###################
### KEYBINDINGS ###
###################

# Modifiers
$mainMod = SUPER 
$strongKey = CTRL
$lightKey = SHIFT

$fullscreenKey = CTRL


# ----------------------------------------------------- 
# System Controls
# ----------------------------------------------------- 
bind = $mainMod $strongKey, Q, killactive,
bind = $mainMod $strongKey, del, exit,
bind = $mainMod $strongKey, backspace, exec, ~/.config/hypr/scripts/restart-apps.sh
bind = $mainMod $strongKey, Up, exec, ~/.config/hypr/scripts/wallpaper.sh random
bind = $mainMod $strongKey, Left, exec, ~/.config/hypr/scripts/wallpaper.sh prev
bind = $mainMod $strongKey, Right, exec, ~/.config/hypr/scripts/wallpaper.sh next
bind = $mainMod $strongKey, L, exec, hyprlock
bind = $mainMod, space, exec, $menu
bind = $mainMod, Escape, exec, ~/scripts/dashboard.py

# Window State
bind = $mainMod $lightKey, mouse:272, togglefloating,
bind = $mainMod $fullscreenKey, mouse:273, fullscreen, 0
bind = $mainMod $fullscreenKey, mouse:272, fullscreen, 1 # Fullscreen preserving waybar


# Zoom in: Super + Mouse Wheel Up
bind = $mainMod $fullscreenKey, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 0.1')

# Zoom out: Super + Mouse Wheel Down
bind = $mainMod $fullscreenKey, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq "([.float - 0.1, 1.0] | max)")


# ----------------------------------------------------- 
# Application Shortcuts
# ----------------------------------------------------- 
# Terminals
bind = $mainMod, return, exec, [float] $terminal
bind = $mainMod $lightKey, return, exec, $terminal

# Browser
bind = $mainMod, B, exec, $browser
bind = $mainMod $lightKey, B, exec, [float] $browser

# Files & Editor
bind = $mainMod, A, exec, [float] $fileManager
bind = $mainMod $lightKey, A, exec, $fileManager
bind = $mainMod, Z, exec, [float] $textEditor
bind = $mainMod $lightKey, Z, exec, $textEditor
bind = $mainMod, X, exec, [float] $sshClient
bind = $mainMod, C, exec, [float] $calculator
bind = $mainMod, K, exec, [float] $passwordManager

# ---------------------------------------------------- 
# Focus & Movement
# ----------------------------------------------------- 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 0, workspace, 1
bind = $mainMod, 1, workspace, 2
bind = $mainMod, 2, workspace, 3
bind = $mainMod, 3, workspace, 4
bind = $mainMod, 4, workspace, 5
bind = $mainMod, 5, workspace, 6
bind = $mainMod, 6, workspace, 7
bind = $mainMod, 7, workspace, 8
bind = $mainMod, 8, workspace, 9
bind = $mainMod, 9, workspace, 10

bind = $mainMod SHIFT, 0, movetoworkspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 2
bind = $mainMod SHIFT, 2, movetoworkspace, 3
bind = $mainMod SHIFT, 3, movetoworkspace, 4
bind = $mainMod SHIFT, 4, movetoworkspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 7
bind = $mainMod SHIFT, 7, movetoworkspace, 8
bind = $mainMod SHIFT, 8, movetoworkspace, 9
bind = $mainMod SHIFT, 9, movetoworkspace, 10

bind = $mainMod, Q, togglespecialworkspace, magic
bind = $mainMod SHIFT, Q, movetoworkspace, special:magic

# Scroll through workspaces
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-10

# Move/Resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ----------------------------------------------------- 
# Screenshots (Hyprshot + Satty Annotation) and clipboard
# ----------------------------------------------------- 
# Capture Window (Saves to file after Satty edit)
bind = CTRL SHIFT, Print, exec, hyprshot -m window --raw | satty --filename - --output-filename ~/Screenshots/scrn_$(date +%Y%m%d_%H%M%S).png
# Capture Window (Clipboard only)
bind = SHIFT, Print, exec, hyprshot -m window --raw | satty --filename - --early-exit
# Capture Region (Saves to file after Satty edit)
bind = CTRL, Print, exec, hyprshot -m region --raw | satty --filename - --output-filename ~/Screenshots/scrn_$(date +%Y%m%d_%H%M%S).png
# Capture Region (Clipboard only)
bind = , Print, exec, hyprshot -m region --raw | satty --filename - --early-exit


# Open the clipboard history menu
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ----------------------------------------------------- 
# Drawing on screen
# ----------------------------------------------------- 
bind = $mainMod $lightKey, D, exec, gromit-mpx --toggle
bind = $mainMod $lightKey, C, exec, gromit-mpx --clear
bind = $mainMod $lightKey, S, exec, gromit-mpx --visibility

# ----------------------------------------------------- 
# Multimedia & Hardware Keys
# ----------------------------------------------------- 
# Volume (Using wpctl for Wireplumber)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media Player
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

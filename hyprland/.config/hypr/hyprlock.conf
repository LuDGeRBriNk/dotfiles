# ==========================================================
# HYPRLOCK CONFIGURATION (Dark/Teal Mocha Aesthetic)
# ==========================================================

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# ----------------------------------------------------------
# BACKGROUND (Applies to ALL screens)
# ----------------------------------------------------------
background {
    monitor =
    path = /home/ludger/.cache/current_wallpaper.txt
    color = rgba(30, 30, 46, 1.0) # Fallback Mocha Base
    blur_passes = 3 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_intensity = 0.5
}

# ==========================================================
# WIDGETS (Restricted to eDP-1, eDP-2, or eDP-3)
# ==========================================================

# ----------------------------------------------------------
# PROFILE AVATAR
# ----------------------------------------------------------
image {
    monitor = eDP-1
    path = /home/ludger/vaults/vault/Media/Images/Avatar/brink.jpg
    size = 120
    border_size = 3
    border_color = rgb(148, 226, 213)
    position = 0, 200
    halign = center
    valign = center
}

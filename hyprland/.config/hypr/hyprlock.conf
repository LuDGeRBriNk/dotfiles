# ----------------------------------------------------------
# TIME LABEL
# ----------------------------------------------------------
label {
    monitor = eDP-1
    text = $TIME
    color = rgb(205, 214, 244)
    font_size = 75
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

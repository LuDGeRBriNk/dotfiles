# ----------------------------------------------------------
# INPUT FIELD (The Password Box)
# ----------------------------------------------------------
input-field {
    monitor = eDP-1
    size = 360, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(148, 226, 213)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    check_color = rgb(249, 226, 175)
    fail_color = rgb(243, 139, 168)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
input-field {
    monitor = eDP-2
    size = 360, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(148, 226, 213)

# ----------------------------------------------------------
# DATE LABEL
# ----------------------------------------------------------
label {
    monitor = eDP-1
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = rgb(186, 194, 222)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

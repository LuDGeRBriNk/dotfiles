# ==========================================================
# HYPRIDLE CONFIGURATION
# ==========================================================

general {
    # Avoid starting multiple hyprlock instances
    lock_cmd = pidof hyprlock || hyprlock 
    
    # Lock the screen before the system goes to sleep
    before_sleep_cmd = loginctl lock-session 
    
    # Ensure displays wake up when the system wakes up
    after_sleep_cmd = hyprctl dispatch dpms on 
}

# ----------------------------------------------------------
# 1. WARNING: Dim Screen
# ----------------------------------------------------------
listener {
    timeout = 270                                # 4:30 mins
    on-timeout = brightnessctl -s set 10         # Save current brightness and dim
    on-resume = brightnessctl -r                 # Restore original brightness
}

# ----------------------------------------------------------
# 2. ACTION: Lock Screen
# ----------------------------------------------------------
listener {
    timeout = 300                                # 5 minutes
    on-timeout = loginctl lock-session           # Triggers the lock_cmd defined above
}

# ----------------------------------------------------------
# 3. POWER SAVE: Turn Off Displays right after lockscreen is active, even if explicitly enabled.
# ----------------------------------------------------------
listener {
    timeout = 5
    # If hyprlock is running, turn off the display
    on-timeout = pidof hyprlock && hyprctl dispatch dpms off
    # When you touch the mouse/keyboard, wake it back up instantly
    on-resume = pidof hyprlock && hyprctl dispatch dpms on
}

listener {
    timeout = 305
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# ----------------------------------------------------------
# 4. DEEP SLEEP: Suspend System
# ----------------------------------------------------------
listener {
    timeout = 7200                               # 2 hours
    on-timeout = systemctl suspend               # Put the laptop to sleep
}